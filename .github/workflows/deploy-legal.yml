# Publishes legal/ to GitHub Pages on push to main.
# After first run: Repo Settings → Pages → Source: GitHub Actions
# Live URLs (repo: hansaglam/identidadeapp):
#   https://hansaglam.github.io/identidadeapp/privacy.html
#   https://hansaglam.github.io/identidadeapp/terms.html

name: Deploy legal pages

on:
  push:
    branches: [main, master]
    paths:
      - "legal/**"
      - ".github/workflows/deploy-legal.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: legal

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
