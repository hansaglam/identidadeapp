# Publishes legal/ → gh-pages branch. Then enable Pages once in repo Settings.
# Live URLs (repo: hansaglam/identidadeapp):
#   https://hansaglam.github.io/identidadeapp/privacy.html
#   https://hansaglam.github.io/identidadeapp/terms.html

name: Deploy legal pages

on:
  push:
    branches: [main, master]
    paths:
      - "legal/**"
      - ".github/workflows/deploy-legal.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-legal-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./legal
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: legal pages"
